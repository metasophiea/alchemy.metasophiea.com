<!DOCTYPE html>
<html lang="en">
    
    <head>
        <title>Alchemy</title>
        <meta charset="utf-8">
        <link href="https://fonts.googleapis.com/css?family=Roboto:100,300&display=swap" rel="stylesheet">

        <!-- gether product information -->
        <script>
            let productInformation = {};
            fetch('/downloads/productInformation.json')
                .then((response) => response.json())
                .then((data) => {
                    productInformation = data;
                    document.getElementById("welcome--downloads--version-string").innerHTML = data.versionString;
                });
        </script>

        <!-- navbar -->
        <link href="navbar.css" rel="stylesheet"/>
        <script src="navbar.js"></script>

        <!-- global -->
        <style>
            html, body{
                margin: 0;
                font-family: Trebuchet MS, Arial, sans-serif;
            }
        </style>

        <!-- welcome -->
        <style>
            #welcome {
                height: 40em;
                width: 100%;

                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            #welcome:before {
                height: 40em;
                width: 100%;
                
                background-position: center;
                background-image: url("/image/four_colour_stripes_banner.png");
                background-repeat: no-repeat;
                background-size: cover;

                content: '';
                position:absolute;
                opacity: 0.5;
            }

            #welcome--heading {
                z-index: 1;

                margin: 0;
                padding: 0;
                text-align: center;
                font-size: 10em;
            }

            #welcome--downloads {
                z-index: 1;

                width: 50%;
                text-align: center;
            }
            #welcome--downloads--description {
                margin: 0;
            }
            #welcome--downloads--version-string {
                margin: 0;
                font-size: small;
                font-weight: 100;
                font-style: italic;
            }
            #welcome--downloads--download-options {
                display: flex;
                justify-content: space-evenly;
            }
            .welcome--downloads--download-options--button {
                height: 10em;
                width: 15em;

                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;

                box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
                margin: 10px;

                transition: height 0.25s, width 0.25s;
            }
            .welcome--downloads--download-options--button:hover {
                height: 10em;
                width: 20em;
            }
            #welcome--downloads--download-options--windows {
                background-image: url("/image/alchemy_windows_banner.jpg");
            }
            #welcome--downloads--download-options--mac {
                background-image: url("/image/alchemy_mac_banner.jpg");
            }
        </style>
    
        <!-- try-classic -->
        <style>
            #try-classic {
                width: 100%;
                padding: 40px 0;
            }
            #try-classic-heading {
                margin: 0;
                text-align: center;
            }
            #try-classic-description {
                text-align: center;
            }
            #try-classic-card {
                margin: auto;
                height: 15em;
                max-width: 60em;
                width: 75%;

                box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);

                background-position: center;
                background-image: url("https://raw.githubusercontent.com/metasophiea/Curve/master/docs/images/logo/curve.png");
                background-repeat: no-repeat;
                background-size: 75%;

                outline-color: rgba(0, 0, 0, 0.2);
            }
            #try-classic-card:hover{
                outline-style: solid;
                outline-width: 6px;
                transition: outline-width 0.25s;
            }
        </style>
        
        <!-- highlighted-demo-video -->
        <style>
            #highlighted-demo-video {
                width: 100%;

                display: flex;
                align-items: flex-start;
            }
            #highlighted-demo-video--section {
                flex: 1;
                margin: 2em;
                font-style: italic;
            }
            #highlighted-demo-video--youtube-video {
                flex: 2;
                margin: 2em;
                min-width: 30em;
                min-height: 30em;
            }
        </style>
        
        <!-- the-news -->
        <!-- <style>
            #the-news {
                height: 40em;
                width: 100%;
                
                background-color:ghostwhite;
            }
        </style>
         -->

        <!-- site-map-and-links -->
        <style>
            #site-map-and-links {
                height: 10em;
                width: 100%;

                display: flex;
                align-items: center;
                justify-content: center;
            }
            #site-map-and-links:before {
                height: 10em;
                width: 100%;
                
                background-position: center;
                background-image: url("/image/four_colour_stripes_banner.png");
                background-repeat: no-repeat;
                background-size: cover;

                content: '';
                position: absolute;
                opacity: 0.5;
            }
            #site-map-and-links--copyright--string {
                margin: 0;
            }
        </style>
    </head>

    <body>
        <section id="navbar">
            <div id="navbar--left">
                <a href="/">
                    <img id="navbar--left--icon" class="navbar--item" src="/image/icon.png"/>
                </a>
            </div>
            <div id="navbar--right">
                <a id="navbar--right--news-item" class="navbar--item" href="/news">News</a>
            </div>
        </section>

        <section id="welcome">
            <h1 id="welcome--heading">Alchemy</h1>
            <div id="welcome--downloads">
                <h2 id="welcome--downloads--description">Download for Windows or MacOS</h2>
                <h3 id="welcome--downloads--version-string">version string</h3>
                <div id="welcome--downloads--download-options">
                    <div 
                        id="welcome--downloads--download-options--windows" 
                        class="welcome--downloads--download-options--button"
                        onclick="window.open(productInformation.windows.link, '_self')"
                    ></div>
                    <div 
                        id="welcome--downloads--download-options--mac" 
                        class="welcome--downloads--download-options--button"
                        onclick="window.open(productInformation.mac.link, '_self')"
                    ></div>
                </div>
            </div>
        </section>

        <section id="try-classic">
            <h1 id="try-classic-heading">Try the classic version in your browser!</h1>
            <p id="try-classic-description">(requires Chrome or Edge)</p>
            <div id="try-classic-card" onclick='window.open("https:\/\/curve.metasophiea.com")'></div>
        </section>

        <section id="highlighted-demo-video">
            <div id="highlighted-demo-video--section">
                <h2 id="highlighted-demo-video--heading">Demo</h2>
                <p id="highlighted-demo-video--description">Check out this 5 minute demonstration made with the classic browser version</p>
            </div>

            <iframe
                id="highlighted-demo-video--youtube-video"
                class="highlighted-demo-video--section"
                src="https://www.youtube.com/embed/wWYRuVK3dro"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
            ></iframe>
        </section>

        <!-- <section id="the-news"></section> -->

        <section id="site-map-and-links">
			<div id="site-map-and-links--copyright">
				<p id="site-map-and-links--copyright--string">&copy; metasophiea / Interloper </p>
				<script>document.getElementById("site-map-and-links--copyright--string").innerHTML += (new Date()).getFullYear();</script>
			</div>
        </section>
    </body>

</html>
